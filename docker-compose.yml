version: '3.8'

services:
  email-verifier:
    build: .
    ports:
      - "8501:8501"
    environment:
      - ENABLE_SMTP_CHECK=false
      - SMTP_PORT=25
      - SMTP_CONNECTION_TIMEOUT=5
      - SMTP_RESPONSE_TIMEOUT=5
      - MAX_WORKERS=10
      - BATCH_SIZE=100
      - DNS_TIMEOUT=5
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
